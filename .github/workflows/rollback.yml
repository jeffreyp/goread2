name: Rollback

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'App Engine version to shift 100% of traffic to (see: gcloud app versions list)'
        required: true
        type: string

# Shared with deploy-prod.yml: both mutate the same production traffic split via
# `gcloud app versions migrate`, so a rollback and a promotion must never run
# concurrently against each other. Queue rather than cancel-in-progress — killing
# a migrate mid-flight is worse than waiting.
concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.CICD_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      - name: Validate version format
        env:
          TARGET_VERSION: ${{ inputs.version }}
        run: |
          if ! [[ "$TARGET_VERSION" =~ ^[a-z0-9][a-z0-9-]{0,63}$ ]]; then
            echo "::error::Invalid version format: '$TARGET_VERSION'. Expected lowercase alphanumeric + hyphens only (App Engine version ID format)." >&2
            exit 1
          fi

      - name: Capture currently-live version before migrating
        id: previous
        run: |
          CURRENT=$(gcloud app versions list --service=default --project=goread-467200 \
            --filter="version.id:prod-* AND traffic_split=1.0" --format="value(version.id)")
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Migrate 100% of traffic to the specified version
        env:
          TARGET_VERSION: ${{ inputs.version }}
        run: |
          gcloud app versions migrate \
            --project=goread-467200 \
            --service=default \
            --quiet \
            -- "$TARGET_VERSION"

      - name: Delete stale production versions (keep current + previous only)
        env:
          TARGET_VERSION: ${{ inputs.version }}
          PREVIOUS_VERSION: ${{ steps.previous.outputs.version }}
        run: |
          STALE=$(gcloud app versions list --service=default --project=goread-467200 \
            --filter="version.id:prod-*" --format="value(version.id)" \
            | grep -v -e "^${TARGET_VERSION}$" -e "^${PREVIOUS_VERSION}$" || true)
          if [ -n "$STALE" ]; then
            echo "Deleting stale production versions: $STALE"
            # shellcheck disable=SC2086
            gcloud app versions delete --service=default --project=goread-467200 --quiet $STALE
          else
            echo "No stale production versions to clean up"
          fi

      - name: Output rollback confirmation
        env:
          TARGET_VERSION: ${{ inputs.version }}
        run: |
          {
            echo "### 🔄 Rollback complete"
            echo ""
            echo "100% of production traffic has been shifted to version: \`$TARGET_VERSION\`"
            echo ""
            echo "URL: https://goread-467200.uc.r.appspot.com"
            echo ""
            echo "Only the current and previously-live versions are kept — any other prod-* versions were deleted."
          } >> "$GITHUB_STEP_SUMMARY"
