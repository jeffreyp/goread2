name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  GO_VERSION: '1.25'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Go
      uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Cache Go modules
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Install dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Set up test environment
      run: |
        echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> $GITHUB_ENV
        echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> $GITHUB_ENV
        echo "GOOGLE_REDIRECT_URL=${{ secrets.GOOGLE_REDIRECT_URL }}" >> $GITHUB_ENV

    - name: Run unit tests
      run: go test -short -race -coverprofile=coverage.out ./internal/...

    - name: Run integration tests
      run: go test -race ./test/integration/...

    - name: Generate coverage report
      run: go tool cover -html=coverage.out -o coverage.html

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
      with:
        file: ./coverage.out
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Upload coverage artifacts
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: coverage-report-go${{ env.GO_VERSION }}
        path: coverage.html

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Go
      uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: golangci-lint
      # golangci-lint-action@v6 hard-refuses golangci-lint v2 ("you must
      # update to golangci-lint-action v7"). Using v9.3.0 (latest as of this
      # writing) rather than the bare-minimum v7, pinned to commit SHA.
      uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
      with:
        # Pinned explicitly rather than "latest": that resolved to v1.64.8,
        # which is built with go1.24 and refuses to lint code targeting a
        # newer go.mod version ("the Go language version used to build
        # golangci-lint is lower than the targeted Go version"). v2.12.2 is
        # built with go1.26 and has no such ceiling.
        version: v2.12.2
        args: --timeout=5m

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install frontend dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint:js

    - name: Run frontend tests
      run: npm run test:ci

    - name: Build frontend assets
      run: make build-frontend

  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # to post a regression comment via gh pr comment
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Go
      uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Install benchstat
      run: go install golang.org/x/perf/cmd/benchstat@latest

    # No baseline is committed to the repo — timings are hardware-dependent,
    # so a baseline is only meaningful when compared against the same runner
    # type it was recorded on. Instead, the baseline is the most recent
    # main-branch benchmark run, rolled forward on every successful push to
    # main (see the "Save updated baseline" step below). A missing cache
    # (e.g. the very first run after this job was added) just skips the
    # comparison and bootstraps the baseline from this run instead.
    - name: Restore benchmark baseline
      id: restore-baseline
      uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: bench-baseline.txt
        key: bench-baseline-none-${{ github.run_id }} # never hit directly; forces the restore-keys fallback below
        restore-keys: |
          bench-baseline-

    - name: Run benchmarks
      run: go test -run='^$' -bench=. -benchmem -benchtime=50x -count=10 ./test/integration/... > bench-current.txt

    - name: Compare against baseline
      id: compare
      # The primary key above is intentionally never matched exactly (it's
      # unique per run), so cache-hit is always false; cache-matched-key is
      # what actually reflects whether restore-keys found a prior baseline.
      if: steps.restore-baseline.outputs.cache-matched-key != ''
      run: ./scripts/check-benchmark-regression.sh bench-baseline.txt bench-current.txt 20 | tee benchstat-report.txt

    - name: Comment on PR with regression report
      if: failure() && steps.compare.outcome == 'failure' && github.event_name == 'pull_request'
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        {
          echo "### ⚠️ Benchmark regression detected"
          echo '```'
          cat benchstat-report.txt
          echo '```'
        } | gh pr comment "${{ github.event.pull_request.number }}" --body-file -

    # No `always()` here: if the compare step above failed (a real
    # regression), these are skipped by the implicit success() check, so a
    # regressed run never rolls its own bad numbers forward as the new
    # baseline. They still run after a skipped compare (first-ever run,
    # bootstrapping the cache) since a skip isn't a failure.
    - name: Save updated baseline
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: cp bench-current.txt bench-baseline.txt

    - name: Cache updated baseline
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: bench-baseline.txt
        key: bench-baseline-${{ github.run_id }}

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Go
      uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Set up test environment
      run: |
        echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> $GITHUB_ENV
        echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> $GITHUB_ENV
        echo "GOOGLE_REDIRECT_URL=${{ secrets.GOOGLE_REDIRECT_URL }}" >> $GITHUB_ENV

    # Regression suite for CSRF, auth-bypass, SSRF, and feed-limit
    # enforcement (test/security/) — a real pass/fail gate, unlike the
    # advisory govulncheck step below.
    - name: Run security regression suite
      run: go test -race ./test/security/...

    - name: Run govulncheck
      continue-on-error: true
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck ./...

  build:
    runs-on: ubuntu-latest
    needs: [test, lint, frontend-build]
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Go
      uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Build all packages
      run: go build -v ./...

    - name: Build deployable binary
      run: make build

    - name: Upload build artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: goread2-binary
        path: goread2
