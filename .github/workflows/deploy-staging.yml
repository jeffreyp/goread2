name: Deploy Staging

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  deploy-staging:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: make build-frontend

      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.CICD_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      - name: Determine staging version name
        id: version
        env:
          # $GITHUB_SHA is NOT the triggering commit for workflow_run events — it's
          # whatever the default branch tip happens to be when this job runs. Use the
          # actual head_sha from the workflow_run event instead, matching what was
          # checked out above.
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: echo "name=staging-${HEAD_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Inject BUILD_VERSION into app.yaml
        run: |
          echo "  BUILD_VERSION: \"${{ steps.version.outputs.name }}\"" >> app.yaml.tmp
          sed -i "/^  SUBSCRIPTION_ENABLED:/r app.yaml.tmp" app.yaml
          rm app.yaml.tmp
          cat app.yaml

      - name: Deploy to App Engine staging (no traffic)
        run: |
          gcloud app deploy app.yaml \
            --project=goread-467200 \
            --version="${{ steps.version.outputs.name }}" \
            --no-promote \
            --quiet

      - name: Deploy fixed 'staging' version for human OAuth login testing (no traffic)
        run: |
          gcloud app deploy app.yaml \
            --project=goread-467200 \
            --version=staging \
            --no-promote \
            --quiet

      - name: Deploy cron.yaml / index.yaml if changed in this commit
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE '^(cron|index)\.yaml$'; then
            echo "cron.yaml or index.yaml changed — deploying config"
            gcloud app deploy cron.yaml index.yaml --project=goread-467200 --quiet
          else
            echo "No changes to cron.yaml or index.yaml — skipping config deploy"
          fi

      - name: Delete stale staging versions (keep only this one)
        env:
          KEEP_VERSION: ${{ steps.version.outputs.name }}
        run: |
          # The "staging-*" filter requires a literal "staging-" prefix, so the fixed
          # "staging" version (no trailing dash) never matches and is never swept here.
          #
          # traffic_split=0 is a hard safety guard: deploy-prod.yml (gr-euu) promotes
          # by running `gcloud app versions migrate` directly onto a staging-<sha>
          # version rather than redeploying under a new name, so a past staging-<sha>
          # can be the version currently serving 100% of production traffic. Without
          # this guard, the very next push to main would delete live production here.
          STALE=$(gcloud app versions list --service=default --project=goread-467200 \
            --filter="version.id:staging-* AND traffic_split=0" --format="value(version.id)" \
            | grep -v "^${KEEP_VERSION}$" || true)
          if [ -n "$STALE" ]; then
            echo "Deleting stale staging versions: $STALE"
            # shellcheck disable=SC2086
            gcloud app versions delete --service=default --project=goread-467200 --quiet $STALE
          else
            echo "No stale staging versions to clean up"
          fi

      - name: Output staging URL
        run: |
          {
            echo "### 🚀 Staged for review"
            echo ""
            echo "**Promotion candidate:** \`${{ steps.version.outputs.name }}\`"
            echo "**URL:** https://${{ steps.version.outputs.name }}-dot-goread-467200.uc.r.appspot.com"
            echo ""
            echo "**Human login testing:** https://staging-dot-goread-467200.uc.r.appspot.com"
            echo "Use this fixed URL to click through and test Google login — per-SHA staging URLs can't complete an OAuth round-trip since Google only allows pre-registered exact redirect URIs. Do NOT exercise Stripe subscription flows here; staging shares live Stripe keys and webhooks point at the prod domain."
            echo ""
            echo "No production traffic has been shifted — both versions were deployed with \`--no-promote\`."
            echo ""
            echo "Only this staging-<sha> version is kept — any prior staging-* versions were deleted. The fixed 'staging' version is overwritten every merge."
          } >> "$GITHUB_STEP_SUMMARY"
