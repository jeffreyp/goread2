<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.title}}</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XYJCPFNCVY"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XYJCPFNCVY');
    </script>
</head>
<body>
    <div class="privacy-container">
        <h1>Subscription activated</h1>

        <div class="privacy-content">
            <p>Your GoRead2 Pro subscription is now active.</p>

            <p>Your account now includes:</p>
            <ul>
                <li>Unlimited RSS feeds</li>
                <li>No feed limits</li>
                <li>Priority support</li>
                <li>Advanced features</li>
            </ul>

            {{if .session_id}}
            <p><small>Session ID: {{.session_id}}</small></p>
            {{end}}
        </div>

        <div class="privacy-actions">
            <a href="/" class="btn btn-primary">Go to GoRead2</a>
            <a href="/subscription" class="btn btn-secondary">Manage Subscription</a>
        </div>
    </div>

    <script>
        // Auto-redirect to main app after 5 seconds
        setTimeout(() => {
            window.location.href = '/';
        }, 5000);
    </script>
</body>
</html>
